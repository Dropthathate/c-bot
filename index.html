<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SomaSync AI - Clinical Documentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-tertiary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app-container {
      display: grid;
      grid-template-columns: 340px 1fr;
      height: 100vh;
      max-width: 1920px;
      margin: 0 auto;
      gap: 1px;
      background: var(--border);
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      letter-spacing: -1px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .status-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-tertiary);
      position: relative;
    }

    .status-indicator.active {
      background: var(--success);
    }

    .status-indicator.active::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--success);
      opacity: 0.2;
      animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

    @keyframes ping {
      75%, 100% {
        transform: scale(2);
        opacity: 0;
      }
    }

    .status-indicator.paused { background: var(--warning); }
    .status-indicator.generating { background: var(--accent); }

    .status-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* CONTROLS */
    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .control-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .control-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-warning {
      background: var(--warning);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    /* TRANSCRIPT */
    .transcript-section {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .transcript-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .transcript-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-tertiary);
      font-size: 13px;
      line-height: 1.6;
    }

    .transcript-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .transcript-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .transcript-text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    /* MAIN CONTENT */
    .main-content {
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 2px;
    }

    .topbar-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .content-area {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      background: var(--bg-secondary);
    }

    .soap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .soap-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 200px;
      transition: box-shadow 0.2s ease;
    }

    .soap-card:hover {
      box-shadow: var(--shadow-md);
    }

    .soap-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .soap-badge {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .subjective .soap-badge {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }

    .objective .soap-badge {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
    }

    .assessment .soap-badge {
      background: rgba(139, 92, 246, 0.1);
      color: #8b5cf6;
    }

    .plan .soap-badge {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
    }

    .soap-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    .soap-body {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
      white-space: pre-wrap;
    }

    .soap-empty {
      color: var(--text-tertiary);
      font-style: italic;
    }

    .warning-banner {
      grid-column: 1 / -1;
      background: rgba(245, 158, 11, 0.05);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
    }

    .warning-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #d97706;
      margin-bottom: 10px;
    }

    .warning-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: #b45309;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 32px;
      text-align: center;
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .empty-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 32px;
      gap: 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">SS</div>
          <div class="logo-text">SomaSync AI</div>
        </div>
        <div class="status-card">
          <div class="status-indicator" id="statusIndicator"></div>
          <div class="status-text" id="statusText">Ready to start</div>
        </div>
      </div>

      <div class="controls">
        <button class="control-btn btn-primary" id="startBtn" onclick="startSession()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" fill="currentColor"/>
          </svg>
          Start Recording
        </button>
        <button class="control-btn btn-warning" id="pauseBtn" onclick="pauseSession()" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="4" y="3" width="3" height="10" fill="currentColor"/>
            <rect x="9" y="3" width="3" height="10" fill="currentColor"/>
          </svg>
          Pause
        </button>
        <button class="control-btn btn-secondary" id="resumeBtn" onclick="resumeSession()" disabled>
          Resume
        </button>
        <button class="control-btn btn-danger" id="endBtn" onclick="endSession()" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="3" width="10" height="10" fill="currentColor"/>
          </svg>
          Generate Note
        </button>
      </div>

      <div class="transcript-section">
        <div class="section-title">Session Transcript</div>
        <div class="transcript-list" id="transcript">
          <div class="transcript-empty">
            Click "Start Recording" to begin<br>
            <span style="font-size: 12px; color: var(--text-tertiary);">AI will convert your voice to clinical documentation</span>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">SOAP Documentation</div>
        <div class="topbar-subtitle">AI-Generated Clinical Note</div>
      </div>

      <div class="content-area" id="contentArea">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">No documentation yet</div>
          <div class="empty-subtitle">Record a session and generate a SOAP note to view results</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚙️ CONFIGURATION
    const SUPABASE_URL = 'https://ucqprtpuuyflnxjmatwo.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE'; // ⬅️ REPLACE THIS

    let recognition;
    let state = 'idle';
    let rawTranscript = [];

    // Initialize Speech Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1];
        if (result.isFinal) {
          handleSpeech(result[0].transcript.trim());
        }
      };

      recognition.onerror = (event) => console.error('Speech error:', event.error);
      recognition.onend = () => { if (state === 'active') try { recognition.start(); } catch(e) {} };
    } else {
      alert('Speech recognition not supported. Use Chrome.');
    }

    function startSession() {
      state = 'active';
      rawTranscript = [];
      document.getElementById('transcript').innerHTML = '';
      recognition.start();
      updateUI();
      addToTranscript('Session started', 'system');
    }

    function pauseSession() {
      state = 'paused';
      recognition.stop();
      updateUI();
      addToTranscript('Paused', 'system');
    }

    function resumeSession() {
      state = 'active';
      recognition.start();
      updateUI();
      addToTranscript('Resumed', 'system');
    }

    async function endSession() {
      state = 'generating';
      recognition.stop();
      updateUI();
      
      const fullTranscript = rawTranscript.join('. ');
      if (!fullTranscript.trim()) {
        alert('No content recorded.');
        state = 'idle';
        updateUI();
        return;
      }

      showLoading();
      await generateSOAP(fullTranscript);
    }

    function handleSpeech(text) {
      if (text.toLowerCase().includes('pause session')) return pauseSession();
      if (text.toLowerCase().includes('end session')) return endSession();
      rawTranscript.push(text);
      addToTranscript(text, 'voice');
    }

    async function generateSOAP(rawNotes) {
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-soap`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ rawNotes, conversationHistory: [] })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        displaySOAP(data.soap, data.warnings || []);
        addToTranscript('Note generated', 'system');
        state = 'idle';
        updateUI();
      } catch (error) {
        showError(error.message);
        state = 'idle';
        updateUI();
      }
    }

    function displaySOAP(soap, warnings) {
      let html = '<div class="soap-grid">';
      
      html += `
        <div class="soap-card subjective">
          <div class="soap-header">
            <div class="soap-badge">S</div>
            <div class="soap-label">Subjective</div>
          </div>
          <div class="soap-body">${soap.subjective || '<span class="soap-empty">Not documented</span>'}</div>
        </div>

        <div class="soap-card objective">
          <div class="soap-header">
            <div class="soap-badge">O</div>
            <div class="soap-label">Objective</div>
          </div>
          <div class="soap-body">${soap.objective || '<span class="soap-empty">Not documented</span>'}</div>
        </div>

        <div class="soap-card assessment">
          <div class="soap-header">
            <div class="soap-badge">A</div>
            <div class="soap-label">Assessment</div>
          </div>
          <div class="soap-body">${soap.assessment || '<span class="soap-empty">Not documented</span>'}</div>
        </div>

        <div class="soap-card plan">
          <div class="soap-header">
            <div class="soap-badge">P</div>
            <div class="soap-label">Plan</div>
          </div>
          <div class="soap-body">${soap.plan || '<span class="soap-empty">Not documented</span>'}</div>
        </div>
      `;

      if (warnings.length) {
        html += `
          <div class="warning-banner">
            <div class="warning-header">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 2L2 14h12L8 2z" fill="currentColor"/>
              </svg>
              Scope of Practice Warnings
            </div>
            <div class="warning-list">${warnings.map(w => `<div>• ${w}</div>`).join('')}</div>
          </div>
        `;
      }

      document.getElementById('contentArea').innerHTML = html + '</div>';
    }

    function showLoading() {
      document.getElementById('contentArea').innerHTML = `
        <div class="loading-state">
          <div class="spinner"></div>
          <div class="loading-text">Generating SOAP note...</div>
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById('contentArea').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon" style="color: var(--danger);">⚠</div>
          <div class="empty-title">Error</div>
          <div class="empty-subtitle">${msg}</div>
        </div>
      `;
    }

    function addToTranscript(text, type) {
      const div = document.createElement('div');
      div.className = 'transcript-item';
      div.innerHTML = `
        <div class="transcript-meta">${new Date().toLocaleTimeString()} · ${type}</div>
        <div class="transcript-text">${text}</div>
      `;
      
      const container = document.getElementById('transcript');
      if (container.querySelector('.transcript-empty')) container.innerHTML = '';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function updateUI() {
      const indicator = document.getElementById('statusIndicator');
      const text = document.getElementById('statusText');
      const btns = {
        start: document.getElementById('startBtn'),
        pause: document.getElementById('pauseBtn'),
        resume: document.getElementById('resumeBtn'),
        end: document.getElementById('endBtn')
      };

      indicator.className = 'status-indicator';
      
      if (state === 'active') {
        indicator.classList.add('active');
        text.textContent = 'Recording';
        btns.start.disabled = true;
        btns.pause.disabled = false;
        btns.resume.disabled = true;
        btns.end.disabled = false;
      } else if (state === 'paused') {
        indicator.classList.add('paused');
        text.textContent = 'Paused';
        btns.start.disabled = true;
        btns.pause.disabled = true;
        btns.resume.disabled = false;
        btns.end.disabled = false;
      } else if (state === 'generating') {
        indicator.classList.add('generating');
        text.textContent = 'Generating...';
        Object.values(btns).forEach(btn => btn.disabled = true);
      } else {
        text.textContent = 'Ready to start';
        btns.start.disabled = false;
        btns.pause.disabled = true;
        btns.resume.disabled = true;
        btns.end.disabled = true;
      }
    }
  </script>
</body>
</html>
