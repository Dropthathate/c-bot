<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SomaSync AI - Voice Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .status {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 20px;
      margin-top: 15px;
      font-weight: bold;
    }
    .status.idle { background: #95a5a6; }
    .status.active { background: #27ae60; animation: pulse 2s infinite; }
    .status.paused { background: #f39c12; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 30px;
    }
    .transcript {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      height: 400px;
      overflow-y: auto;
    }
    .entry {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    .controls {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
    }
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-start { background: #27ae60; color: white; }
    .btn-pause { background: #f39c12; color: white; }
    .btn-end { background: #e74c3c; color: white; }
    .soap-note {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .soap-section { margin-bottom: 15px; }
    .soap-section h4 { color: #667eea; font-size: 12px; text-transform: uppercase; }
    .soap-content { font-size: 13px; margin-top: 5px; color: #555; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎧 SomaSync AI</h1>
      <p>Voice-Controlled Clinical Documentation</p>
      <div class="status idle" id="status">Idle - Click Start</div>
    </div>
    
    <div class="main">
      <div>
        <h2>Session Transcript</h2>
        <div class="transcript" id="transcript">
          <p style="color: #999; text-align: center; padding: 50px 20px;">
            Click "Start Session" or say "start session" to begin
          </p>
        </div>
      </div>
      
      <div>
        <div class="controls">
          <h3>Controls</h3>
          <button class="btn-start" id="startBtn" onclick="startSession()">
            ▶️ Start Session
          </button>
          <button class="btn-pause" id="pauseBtn" onclick="pauseSession()" disabled>
            ⏸️ Pause
          </button>
          <button class="btn-start" id="resumeBtn" onclick="resumeSession()" disabled>
            ▶️ Resume
          </button>
          <button class="btn-end" id="endBtn" onclick="endSession()" disabled>
            ⏹️ End & Generate Note
          </button>
        </div>
        
        <div class="soap-note">
          <h4>SOAP Note Preview</h4>
          <div id="soapPreview">Start a session to see documentation</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let recognition;
    let state = 'idle';
    let transcript = [];
    let soapNote = { subjective: [], objective: [], assessment: [], plan: [] };

    // Initialize Speech Recognition
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onresult = (event) => {
        const result = event.results[event.results.length - 1];
        if (result.isFinal) {
          const text = result[0].transcript.trim();
          handleSpeech(text);
        }
      };

      recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
      };

      recognition.onend = () => {
        if (state === 'active') {
          recognition.start(); // Auto-restart
        }
      };
    } else {
      alert('Speech recognition not supported in this browser. Use Chrome.');
    }

    function startSession() {
      state = 'active';
      recognition.start();
      updateUI();
      speak('Starting assessment session. I am listening.');
      addToTranscript('Session started', 'system');
    }

    function pauseSession() {
      state = 'paused';
      recognition.stop();
      updateUI();
      speak('Session paused');
      addToTranscript('Session paused', 'system');
    }

    function resumeSession() {
      state = 'active';
      recognition.start();
      updateUI();
      speak('Session resumed');
      addToTranscript('Session resumed', 'system');
    }

    function endSession() {
      state = 'idle';
      recognition.stop();
      updateUI();
      generateSOAPNote();
      speak('Session ended. SOAP note generated.');
      addToTranscript('Session ended', 'system');
    }

    function handleSpeech(text) {
      const lower = text.toLowerCase();

      // Voice commands
      if (lower.includes('pause')) {
        pauseSession();
      } else if (lower.includes('resume') || lower.includes('continue')) {
        resumeSession();
      } else if (lower.includes('end session')) {
        endSession();
      } else {
        // Process as clinical observation
        addToTranscript(text, 'observation');
        categorizeObservation(text);
      }
    }

    function categorizeObservation(text) {
      const lower = text.toLowerCase();
      
      // Simple keyword-based categorization
      if (lower.match(/pain|complains?|reports?|states?|feels?/)) {
        soapNote.subjective.push(text);
      } else if (lower.match(/observed?|palpation|tender|tight|restricted|range of motion|rom/)) {
        soapNote.objective.push(text);
      } else if (lower.match(/diagnosis|pattern|syndrome|indicates?|suggests?/)) {
        soapNote.assessment.push(text);
      } else if (lower.match(/treatment|plan|recommend|follow.?up|exercise/)) {
        soapNote.plan.push(text);
      } else {
        soapNote.subjective.push(text); // Default to subjective
      }

      updateSOAPPreview();
    }

    function addToTranscript(text, type) {
      transcript.push({ text, type, time: new Date().toLocaleTimeString() });
      
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = `
        <small style="color: #999;">${new Date().toLocaleTimeString()} - ${type}</small>
        <p style="margin-top: 5px;">${text}</p>
      `;
      
      const container = document.getElementById('transcript');
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function updateSOAPPreview() {
      const preview = document.getElementById('soapPreview');
      let html = '';

      if (soapNote.subjective.length) {
        html += `<div class="soap-section">
          <h4>SUBJECTIVE</h4>
          <div class="soap-content">${soapNote.subjective.join('. ')}</div>
        </div>`;
      }
      if (soapNote.objective.length) {
        html += `<div class="soap-section">
          <h4>OBJECTIVE</h4>
          <div class="soap-content">${soapNote.objective.join('. ')}</div>
        </div>`;
      }
      if (soapNote.assessment.length) {
        html += `<div class="soap-section">
          <h4>ASSESSMENT</h4>
          <div class="soap-content">${soapNote.assessment.join('. ')}</div>
        </div>`;
      }
      if (soapNote.plan.length) {
        html += `<div class="soap-section">
          <h4>PLAN</h4>
          <div class="soap-content">${soapNote.plan.join('. ')}</div>
        </div>`;
      }

      preview.innerHTML = html || 'Start speaking to build the note...';
    }

    function generateSOAPNote() {
      updateSOAPPreview();
      console.log('Complete SOAP Note:', soapNote);
      // Here you would save/export the note
    }

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 1.1;
      window.speechSynthesis.speak(utterance);
    }

    function updateUI() {
      const statusEl = document.getElementById('status');
      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const resumeBtn = document.getElementById('resumeBtn');
      const endBtn = document.getElementById('endBtn');

      if (state === 'active') {
        statusEl.textContent = 'Recording Session';
        statusEl.className = 'status active';
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        resumeBtn.disabled = true;
        endBtn.disabled = false;
      } else if (state === 'paused') {
        statusEl.textContent = 'Paused';
        statusEl.className = 'status paused';
        startBtn.disabled = true;
        pauseBtn.disabled = true;
        resumeBtn.disabled = false;
        endBtn.disabled = false;
      } else {
        statusEl.textContent = 'Idle - Click Start';
        statusEl.className = 'status idle';
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        resumeBtn.disabled = true;
        endBtn.disabled = true;
      }
    }
  </script>
</body>
</html>
